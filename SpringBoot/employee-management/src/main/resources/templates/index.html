<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Employee Management System</title>
        
        <!-- Bootstrap 5 CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Font Awesome Icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        
        <style>
            :root {
                --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }

            body {
                background: var(--primary-gradient);
                min-height: 100vh;
                padding: 20px 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            .header {
                text-align: center;
                color: white;
                margin-bottom: 40px;
                padding: 30px 0;
            }

            .header h1 {
                font-weight: 700;
                font-size: 2.5rem;
                margin-bottom: 10px;
            }

            .header p {
                font-size: 1.1rem;
                opacity: 0.9;
            }

            .card {
                border: none;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                margin-bottom: 30px;
            }

            .card-header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                border-radius: 15px 15px 0 0 !important;
                padding: 20px;
                border: none;
            }

            .card-header h5 {
                margin: 0;
                font-weight: 600;
            }

            .form-control, .form-select {
                border-radius: 8px;
                border: 1px solid #e0e0e0;
                padding: 10px 15px;
                margin-bottom: 15px;
            }

            .form-control:focus {
                box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
                border-color: #667eea;
            }

            .btn-submit {
                background: var(--primary-gradient);
                border: none;
                border-radius: 8px;
                padding: 10px 30px;
                font-weight: 600;
                width: 100%;
                margin-top: 10px;
            }

            .btn-submit:hover {
                opacity: 0.9;
                color: white;
            }

            .table {
                border-collapse: collapse;
            }

            .table thead {
                background: #f8f9fa;
                font-weight: 600;
                color: #333;
            }

            .table tbody tr {
                border-bottom: 1px solid #e0e0e0;
                transition: background-color 0.3s;
            }

            .table tbody tr:hover {
                background-color: #f8f9fa;
            }

            .action-buttons {
                display: flex;
                gap: 8px;
            }

            .btn-edit, .btn-delete {
                padding: 5px 10px;
                font-size: 0.85rem;
                border-radius: 6px;
                border: none;
                cursor: pointer;
                transition: all 0.3s;
            }

            .btn-edit {
                background-color: #ffc107;
                color: white;
            }

            .btn-edit:hover {
                background-color: #e0a800;
                transform: translateY(-2px);
            }

            .btn-delete {
                background-color: #dc3545;
                color: white;
            }

            .btn-delete:hover {
                background-color: #c82333;
                transform: translateY(-2px);
            }

            .empty-state {
                text-align: center;
                padding: 40px 20px;
            }

            .empty-state i {
                font-size: 3rem;
                color: #ccc;
                margin-bottom: 20px;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <!-- Header -->
            <div class="header">
                <h1><i class="fas fa-users"></i> Employee Management</h1>
                <p>Manage your employee database efficiently</p>
            </div>

            <div class="row">
                <!-- Add Employee Form -->
                <div class="col-lg-4 col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-user-plus"></i> Add New Employee</h5>
                        </div>
                        <div class="card-body">
                            <form action="/add" method="post" id="employeeForm">
                                <div class="mb-3">
                                    <label class="form-label">ID</label>
                                    <input type="number" class="form-control" name="id" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Name</label>
                                    <input type="text" class="form-control" name="name" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Department</label>
                                    <input type="text" class="form-control" name="department" required>
                                </div>
                                <button type="submit" class="btn btn-submit">
                                    <i class="fas fa-save"></i> Add Employee
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Employee List -->
                <div class="col-lg-8 col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i> Employee List</h5>
                        </div>
                        <div class="card-body">
                            <div th:if="${employees.isEmpty()}" class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>No employees yet. Add your first employee above!</p>
                            </div>
                            <div th:unless="${employees.isEmpty()}" class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Name</th>
                                            <th>Department</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="emp : ${employees}">
                                            <td th:text="${emp.id}"></td>
                                            <td th:text="${emp.name}"></td>
                                            <td th:text="${emp.department}"></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
