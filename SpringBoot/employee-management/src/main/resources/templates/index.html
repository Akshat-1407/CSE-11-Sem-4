<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Employee Management System</title>
        
        <!-- Bootstrap 5 CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Font Awesome Icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        
        <style>
            body {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            .header {
                text-align: center;
                color: #fff;
                margin-bottom: 2rem;
                padding: 2rem 0 1rem 0;
            }
            .card {
                border-radius: 1rem;
                box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            }
            .card-header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: #fff;
                border-radius: 1rem 1rem 0 0 !important;
            }
            .btn-submit {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: #fff;
                border: none;
            }
            .btn-submit:hover {
                opacity: 0.9;
            }
            .empty-state {
                text-align: center;
                padding: 2rem 1rem;
                color: #fff;
            }
            .empty-state i {
                font-size: 2.5rem;
                color: #eee;
                margin-bottom: 1rem;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <!-- Header -->
            <div class="header">
                <h1><i class="fas fa-users"></i> Employee Management</h1>
                <p>Manage your employee database efficiently</p>
            </div>

            <div class="row">
                <!-- Add Employee Form -->
                <div class="col-lg-4 col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-user-plus"></i> Add New Employee</h5>
                        </div>
                        <div class="card-body">
                            <form action="/add" method="post" id="employeeForm">
                                <div class="mb-3">
                                    <label class="form-label">ID</label>
                                    <input type="number" class="form-control" name="id" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Name</label>
                                    <input type="text" class="form-control" name="name" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Department</label>
                                    <input type="text" class="form-control" name="department" required>
                                </div>
                                <button type="submit" class="btn btn-submit">
                                    <i class="fas fa-save"></i> Add Employee
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Employee List -->
                <div class="col-lg-8 col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-list"></i> Employee List</h5>
                        </div>
                        <div class="card-body">
                            <div th:if="${employees.isEmpty()}" class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>No employees yet. Add your first employee above!</p>
                            </div>
                            <div th:unless="${employees.isEmpty()}" class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Name</th>
                                            <th>Department</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="emp : ${employees}">
                                            <td th:text="${emp.id}"></td>
                                            <td th:text="${emp.name}"></td>
                                            <td th:text="${emp.department}"></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
