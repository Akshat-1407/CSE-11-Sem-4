<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee - EMS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --success: #4CAF50;
            --danger: #dc3545;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 30px 0;
        }

        .navbar {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 25px;
            border: none;
        }

        .card-header h4 {
            margin: 0;
            font-weight: 600;
        }

        .card-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .form-control::placeholder {
            color: #999;
        }

        .field-hint {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-submit, .btn-cancel {
            flex: 1;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
            color: #333;
        }

        .form-icon {
            width: 20px;
            text-align: center;
            color: var(--primary);
        }

        .breadcrumb-section {
            margin-bottom: 30px;
        }

        .breadcrumb-section a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .breadcrumb-section a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-building"></i> EMS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/employees"><i class="fas fa-users"></i> Employees</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Form Container -->
    <div class="container">
        <div class="breadcrumb-section">
            <a href="/"><i class="fas fa-home"></i> Home</a>
            <span> / </span>
            <a href="/employees"><i class="fas fa-users"></i> Employees</a>
            <span> / </span>
            <span><i class="fas fa-user-plus"></i> Add Employee</span>
        </div>

        <div class="form-container">
            <div class="card">
                <div class="card-header">
                    <h4><i class="fas fa-user-plus"></i> Add New Employee</h4>
                </div>
                <div class="card-body">
                    <form action="/save" method="post" id="employeeForm">
                        
                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-user form-icon"></i>
                                Full Name
                            </label>
                            <input 
                                type="text" 
                                class="form-control" 
                                name="name" 
                                placeholder="Enter full name"
                                required>
                            <div class="field-hint">First and Last name</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-envelope form-icon"></i>
                                Email Address
                            </label>
                            <input 
                                type="email" 
                                class="form-control" 
                                name="email" 
                                placeholder="Enter email address"
                                required>
                            <div class="field-hint">e.g., john.doe@company.com</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-briefcase form-icon"></i>
                                Department
                            </label>
                            <input 
                                type="text" 
                                class="form-control" 
                                name="department" 
                                placeholder="e.g., HR, IT, Finance"
                                required>
                            <div class="field-hint">Select or enter department name</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-dollar-sign form-icon"></i>
                                Monthly Salary
                            </label>
                            <input 
                                type="number" 
                                class="form-control" 
                                name="salary" 
                                placeholder="Enter salary amount"
                                step="0.01"
                                required>
                            <div class="field-hint">Annual or monthly salary</div>
                        </div>

                        <div class="button-group">
                            <button type="submit" class="btn-submit">
                                <i class="fas fa-save"></i> Save Employee
                            </button>
                            <a href="/employees" class="btn-cancel">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Form validation
        document.getElementById('employeeForm').addEventListener('submit', function(e) {
            const name = document.querySelector('input[name="name"]').value.trim();
            const email = document.querySelector('input[name="email"]').value.trim();
            const department = document.querySelector('input[name="department"]').value.trim();
            const salary = document.querySelector('input[name="salary"]').value.trim();

            if (!name || !email || !department || !salary) {
                alert('All fields are required!');
                e.preventDefault();
                return false;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address!');
                e.preventDefault();
                return false;
            }

            // Salary validation
            if (isNaN(salary) || salary <= 0) {
                alert('Please enter a valid salary amount!');
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
